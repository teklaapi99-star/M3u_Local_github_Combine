name: Update Combined Tamil IPTV Playlist

on:
  schedule:
    - cron: '0 4 * * *'        # Daily at 4:00 AM UTC
  workflow_dispatch:

jobs:
  merge-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6        # Updated to v6 (Node 24)

      - name: Set up Python 3.12
        uses: actions/setup-python@v6    # Updated to v6 (Node 24)
        with:
          python-version: '3.12'

      - name: Run M3U Merger Script
        run: python merge_m3u.py

      - name: Commit and push if changes detected
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add combined-tam.m3u
          
          if git diff --cached --quiet; then
            echo "No changes to commit. Playlist is already up to date."
          else
            git commit -m "chore: update combined-tam.m3u with latest iptv-org Tamil channels + group TV"
            git push
            echo "✅ Successfully updated and pushed combined-tam.m3u"
          fi
